* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: #181818;
  border-bottom: 1px solid #2a2a2a;
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
header h1 { font-size:14px; font-weight:700; letter-spacing:0.3px; }
.badge {
  background:#1a3a1a;
  color:#4ade80;
  font-size:10px;
  font-weight:700;
  padding:3px 8px;
  border-radius:20px;
  border:1px solid #2a5a2a;
}
.body {
  display:flex;
  flex:1;
  overflow:hidden;
}

/* ── Panel ── */
.panel {
  width:260px;
  min-width:260px;
  background:#141414;
  border-right:1px solid #222;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  padding:20px 16px;
  gap:0;
}
.field { margin-bottom:16px; }
.field label {
  display:block;
  font-size:10px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.8px;
  color:#555;
  margin-bottom:6px;
}
textarea, input[type=number], input[type=range] {
  width:100%;
  background:#1e1e1e;
  border:1px solid #2a2a2a;
  border-radius:8px;
  color:#fff;
  font-size:13px;
  font-family:inherit;
  outline:none;
  transition:border-color 0.15s;
}
textarea {
  padding:10px 12px;
  resize:none;
  line-height:1.5;
}
textarea:focus, input[type=number]:focus { border-color:#3b82f6; }
input[type=number] { padding:8px 12px; }
input[type=range] {
  padding:0;
  border:none;
  background:none;
  -webkit-appearance:none;
  height:4px;
  border-radius:2px;
  background:#2a2a2a;
  cursor:pointer;
  margin-top:8px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:16px;
  height:16px;
  border-radius:50%;
  background:#3b82f6;
  cursor:pointer;
}
.slider-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:4px;
}
.slider-val {
  font-size:11px;
  color:#3b82f6;
  font-weight:700;
  font-variant-numeric:tabular-nums;
}
.btn {
  width:100%;
  padding:11px;
  border:none;
  border-radius:8px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:all 0.15s;
  letter-spacing:0.2px;
  margin-bottom:8px;
}
.btn:active { transform:scale(0.97); }
.btn-blue  { background:#3b82f6; color:#fff; }
.btn-blue:hover { background:#2563eb; }
.btn-green { background:#16a34a; color:#fff; }
.btn-green:hover { background:#15803d; }
.btn-dim   { background:#1e1e1e; color:#555; border:1px solid #2a2a2a; cursor:not-allowed; }
.divider   { border:none; border-top:1px solid #1e1e1e; margin:16px 0; }
.status {
  font-size:11px;
  padding:8px 12px;
  border-radius:6px;
  text-align:center;
  min-height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1.4;
}
.s-idle    { background:#1a1a1a; color:#444; }
.s-ok      { background:#0f2a0f; color:#4ade80; }
.s-err     { background:#2a0f0f; color:#f87171; }
.s-working { background:#0f1a2a; color:#60a5fa; }

/* Tabs in panel */
.tabs { display:flex; margin-bottom:20px; background:#1a1a1a; border-radius:8px; padding:3px; }
.tab  {
  flex:1; padding:7px 0; text-align:center;
  font-size:11px; font-weight:700;
  border:none; background:none; color:#555;
  border-radius:6px; cursor:pointer; transition:all 0.15s;
}
.tab.active { background:#2a2a2a; color:#fff; }
.tabpanel { display:none; }
.tabpanel.active { display:block; }

/* ── Preview ── */
.preview-area {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  overflow:auto;
  gap:16px;
  background:#0a0a0a;
}
.canvas-shell {
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  max-width:100%;
}
canvas { display:block; max-width:100%; height:auto; }
.empty-state {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  color:#333;
}
.empty-state .icon { font-size:48px; }
.empty-state p { font-size:13px; }

/* batch grid */
.batch-results { width:100%; max-width:960px; }
.batch-top {
  display:flex; align-items:center;
  justify-content:space-between; margin-bottom:16px;
}
.batch-top h3 { font-size:13px; color:#666; }
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:12px;
}
.card-tile { background:#141414; border-radius:8px; overflow:hidden; border:1px solid #1e1e1e; }
.card-tile img { width:100%; display:block; }
.card-tile footer {
  padding:8px 10px; display:flex; align-items:center;
  justify-content:space-between; gap:8px;
}
.card-tile footer span { font-size:11px; color:#555; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.card-tile footer button {
  flex-shrink:0; padding:4px 10px;
  font-size:11px; font-weight:700;
  background:#1e1e1e; border:1px solid #2a2a2a;
  color:#aaa; border-radius:5px; cursor:pointer;
}
.card-tile footer button:hover { background:#3b82f6; border-color:#3b82f6; color:#fff; }
progress {
  width:100%; height:3px; border:none; border-radius:2px;
  margin:8px 0; accent-color:#3b82f6;
}
</style>
</head>

<header>

  <span class="badge">Futura PT Cond · 70pt</span>

<div class="body">
  <aside class="panel">

    <div class="tabs">
      <button class="tab active" data-tab="single">Single</button>
      <button class="tab" data-tab="batch">Batch</button>
    </div>

    <!-- SINGLE -->
    <div class="tabpanel active" id="tab-single">
      <div class="field">
        <label>Dish Name</label>

        <label>Font Size (pt)</label>
        <input type="number" id="font-size" value="70" min="20" max="300" />
      </div>
      <div class="field">
        <div class="slider-row">
          <label style="margin:0">Line Spacing</label>
          <span class="slider-val" id="ls-val">72%</span>
        </div>
        <input type="range" id="ls-slider" min="50" max="100" value="72" />
      </div>
      <div class="field">
        <div class="slider-row">
          <label style="margin:0">Vertical Position</label>
          <span class="slider-val" id="vp-val">50%</span>
        </div>
        <input type="range" id="vp-slider" min="0" max="100" value="50" />
      </div>
      <button class="btn btn-blue" id="gen-btn">⚡ Generate Card</button>
      <div class="status s-idle" id="s-single">Loading font…</div>
      <hr class="divider"/>
      <button class="btn btn-dim" id="dl-btn" disabled>↓ Download PNG</button>
    </div>

    <!-- BATCH -->
    <div class="tabpanel" id="tab-batch">
      <div class="field">
        <label>Dish Names — one per line</label>
        <textarea id="batch-list" rows="9"
          placeholder="PANEER BHURJI&#10;BOILED EGGS&#10;LEMON BANTA SODA&#10;HAND ROLLED BUTTER CROISSANT&#10;CARAMEL ICED LATTE"></textarea>
      </div>
      <div class="field">
        <label>Font Size (pt)</label>
        <input type="number" id="batch-font-size" value="70" min="20" max="300" />

      <div class="field">
        <div class="slider-row">
          <label style="margin:0">Line Spacing</label>
          <span class="slider-val" id="bls-val">72%</span>
        </div>
        <input type="range" id="bls-slider" min="50" max="100" value="72" />
      </div>
      <div class="field">
        <div class="slider-row">
          <label style="margin:0">Vertical Position</label>
          <span class="slider-val" id="bvp-val">50%</span>
        </div>
        <input type="range" id="bvp-slider" min="0" max="100" value="50" />
      </div>
      <button class="btn btn-blue" id="batch-btn">⚡ Generate All</button>
      <progress id="prog" value="0" max="100" style="display:none"></progress>
      <div class="status s-idle" id="s-batch">Ready</div>
    </div>

  </aside>

  <main class="preview-area" id="preview-area">
    <div class="empty-state" id="empty">
      <div class="icon">🃏</div>
      <p>Enter a dish name and click Generate</p>
    </div>
    <div class="canvas-shell" id="canvas-shell" style="display:none">
      <canvas id="cv"></canvas>
    </div>
    <div class="batch-results" id="batch-results" style="display:none">
      <div class="batch-top">
        <h3 id="batch-count"></h3>
        <button class="btn btn-green" id="dl-all-btn" style="width:auto;padding:8px 18px;margin:0">↓ Download All</button>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </main>
</div>

BG.onload = () => {
  bgReady = true;
  checkReady();
};

function checkReady() {
  if (fontReady && bgReady) {
    ss('s-single', '✓ Ready — enter a dish name', 'ok');
    ss('s-batch',  'Ready', 'ok');
  }
}

// ── Sliders ──────────────────────────────────────────────────────────────────
function wire(sliderId, valId) {
  const s = document.getElementById(sliderId);
  const v = document.getElementById(valId);
  s.addEventListener('input', () => v.textContent = s.value + '%');
}
wire('ls-slider',  'ls-val');
wire('vp-slider',  'vp-val');
wire('bls-slider', 'bls-val');
wire('bvp-slider', 'bvp-val');

// ── Tabs ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tabpanel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-' + t.dataset.tab).classList.add('active');
  });
});

// ── Status helper ────────────────────────────────────────────────────────────
function ss(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status s-' + type;
}

// ── Core renderer ────────────────────────────────────────────────────────────
const REF_W    = 566;
const STEPS    = 50;
const FONT_REF = 70;
const SHX_REF  = -10.67;
const SHY_REF  =  12.00;
const STR_REF  =  1.89;

function render(text, fontSize, lsPct, vpPct) {
  const cvs = document.createElement('canvas');
  cvs.width  = BG.naturalWidth;
  cvs.height = BG.naturalHeight;
  const ctx  = cvs.getContext('2d');

  ctx.drawImage(BG, 0, 0);

  const scale   = cvs.width / REF_W;
  const fs      = (fontSize || FONT_REF) * scale;
  const lh      = (lsPct / 100) * fs;
  const shx     = SHX_REF * scale;
  const shy     = SHY_REF * scale;
  const str     = STR_REF * scale * 2;
  const maxW    = cvs.width * 0.88;
  const cx      = cvs.width / 2;

  ctx.font         = fs + 'px CardFont';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  ctx.lineJoin     = 'round';

  // Word-wrap
  const lines = [];
  text.split('\n').filter(l => l.trim()).forEach(raw => {
    const words = raw.split(' ');
    let cur = '';
    words.forEach(w => {
      const test = cur ? cur + ' ' + w : w;
      if (ctx.measureText(test).width <= maxW) { cur = test; }
      else { if (cur) lines.push(cur); cur = w; }
    });
    if (cur) lines.push(cur);
  });

  // Vertical centering
  const visH  = fs * 0.78;
  const totalH = visH + (lines.length - 1) * lh;
  const avail  = cvs.height - totalH;
  const sy     = avail * (vpPct / 100);

  // Draw 52 layers
  for (let i = 0; i <= STEPS + 1; i++) {
    const front = i === STEPS + 1;
    const t     = front ? 1 : i / STEPS;
    const dx    = front ? 0 : shx * (1 - t);
    const dy    = front ? 0 : shy * (1 - t);
    ctx.fillStyle   = front ? '#ffffff' : '#1f1f1f';
    ctx.strokeStyle = '#1f1f1f';
    ctx.lineWidth   = str;
    lines.forEach((ln, li) => {
      const x = cx + dx;
      const y = sy + li * lh + dy;
      ctx.strokeText(ln, x, y);
      ctx.fillText(ln, x, y);
    });
  }
  return cvs;
}

function fname(text) {
  return text.replace(/\n/g,' ').replace(/[^a-z0-9 ]/gi,'').trim().replace(/\s+/g,'_').toLowerCase();
}

function dlCvs(cvs, name) {
  const a = document.createElement('a');
  a.download = name + '.png';
  a.href = cvs.toDataURL('image/png');
  a.click();
}

// ── Single generate ──────────────────────────────────────────────────────────
document.getElementById('gen-btn').addEventListener('click', () => {
  if (!fontReady || !bgReady) { ss('s-single','Still loading…','working'); return; }
  const text = document.getElementById('dish').value.trim().toUpperCase();
  if (!text) { ss('s-single','Please enter a dish name.','err'); return; }
  const fs = +document.getElementById('font-size').value || 70;
  const ls = +document.getElementById('ls-slider').value;
  const vp = +document.getElementById('vp-slider').value;
  ss('s-single','Rendering…','working');
  setTimeout(() => {
    try {
      const cvs = render(text, fs, ls, vp);
      lastCvs = cvs;
      const preview = document.getElementById('cv');
      preview.width  = cvs.width;
      preview.height = cvs.height;
      preview.getContext('2d').drawImage(cvs, 0, 0);
      document.getElementById('empty').style.display        = 'none';
      document.getElementById('canvas-shell').style.display = 'block';
      document.getElementById('batch-results').style.display= 'none';
      const dlBtn = document.getElementById('dl-btn');
      dlBtn.disabled   = false;
      dlBtn.className  = 'btn btn-green';
      dlBtn.dataset.name = fname(text);
      ss('s-single','✓ Done!','ok');
    } catch(e) { ss('s-single','Error: '+e.message,'err'); }
  }, 16);
});

document.getElementById('dl-btn').addEventListener('click', () => {
  if (lastCvs) dlCvs(lastCvs, document.getElementById('dl-btn').dataset.name || 'card');
});

// ── Batch generate ───────────────────────────────────────────────────────────
let batchCvs = [];
document.getElementById('batch-btn').addEventListener('click', async () => {
  if (!fontReady || !bgReady) { ss('s-batch','Still loading…','working'); return; }
  const names = document.getElementById('batch-list').value
    .split('\n').map(l => l.trim().toUpperCase()).filter(l => l.length > 0);
  if (!names.length) { ss('s-batch','Enter at least one name.','err'); return; }
  const fs = +document.getElementById('batch-font-size').value || 70;
  const ls = +document.getElementById('bls-slider').value;
  const vp = +document.getElementById('bvp-slider').value;

  batchCvs = [];
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const prog = document.getElementById('prog');
  prog.style.display = 'block';
  prog.max = names.length;
  document.getElementById('empty').style.display         = 'none';
  document.getElementById('canvas-shell').style.display  = 'none';
  document.getElementById('batch-results').style.display = 'none';

  for (let i = 0; i < names.length; i++) {
    await new Promise(r => setTimeout(r, 4));
    const cvs  = render(names[i], fs, ls, vp);
    const name = fname(names[i]);
    batchCvs.push({cvs, name});
    prog.value = i + 1;
    ss('s-batch', `Generating ${i+1} / ${names.length}…`, 'working');

    const tile = document.createElement('div');
    tile.className = 'card-tile';
    const img = document.createElement('img');
    img.src = cvs.toDataURL('image/jpeg', 0.85);
    const footer = document.createElement('footer');
    const sp = document.createElement('span');
    sp.textContent = names[i];
    const btn = document.createElement('button');
    btn.textContent = '↓ PNG';
    btn.addEventListener('click', () => dlCvs(cvs, name));
    footer.append(sp, btn);
    tile.append(img, footer);
    grid.appendChild(tile);
  }

  prog.style.display = 'none';
  document.getElementById('batch-count').textContent = names.length + ' cards generated';
  document.getElementById('batch-results').style.display = 'block';
  ss('s-batch', `✓ ${names.length} cards ready!`, 'ok');
});

document.getElementById('dl-all-btn').addEventListener('click', async () => {
  for (const {cvs, name} of batchCvs) {
    dlCvs(cvs, name);
    await new Promise(r => setTimeout(r, 150));
  }
});
</script>
